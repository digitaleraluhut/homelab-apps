name: lobehub
description: lobehub deployment — self-hosted LobeHub on homelab k8s
runtime:
  name: nodejs
  options:
    typescript: true
main: src/

config:
  # All values use the "lobehub:" namespace prefix (matching pulumi.Config("lobehub") in src/index.ts).
  # Set with: pulumi config set lobehub:<key> <value>

  # Stack reference to homelab base stack (provides tunnelCname, cloudflareZoneId, domain)
  lobehub:homelabStack:
    value: digitaleraluhut/homelab/dev

  # Image reference — official Docker Hub image: docker.io/lobehub/lobehub
  # Update with: pulumi config set lobehub:lobehubImage lobehub/lobehub:<version>
  # Available tags (no "v" prefix): https://hub.docker.com/r/lobehub/lobehub/tags

  # Required secrets (set with --secret flag):
  # pulumi config set lobehub:authSecret       <random-32>     --secret
  # pulumi config set lobehub:keyVaultsSecret  <random-32>     --secret
  #
  # Database: a single-replica paradedb (Postgres 17 + pgvector) is deployed
  # into the lobehub namespace by default, with an auto-generated password.
  # To point at an external DB instead, set:
  # pulumi config set lobehub:databaseUrl <postgres-url> --secret
  #
  # Optional provider API keys:
  # pulumi config set lobehub:openaiApiKey     <sk-...>        --secret

  # Web search — optional; requires a Brave Search API key.
  # pulumi config set lobehub:enableSearch      true
  # pulumi config set lobehub:braveApiKey       <brave-api-key>  --secret
