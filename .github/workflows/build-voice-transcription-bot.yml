name: Build voice-transcription-bot image

# Builds and pushes the voice-transcription-bot image to ghcr.io.
#
# The image provides the Matrix bot that listens for voice messages,
# transcribes them via whisper.cpp (flinker:8081), and posts transcripts
# back as threaded replies.
#
# Image: ghcr.io/<owner>/voice-transcription-bot:<sha> and :latest
#
# After a successful build on main, deploy-matrix is triggered automatically
# with the new image tag so the bot rolls out without a manual step.

on:
  push:
    branches:
      - main
    paths:
      - apps/matrix/voice-transcription-bot/**
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - apps/matrix/voice-transcription-bot/**
      - "!**/*.md"
  workflow_dispatch:

permissions:
  contents: write   # required to commit Pulumi.dev.yaml with the new image SHA
  packages: write   # required to push to ghcr.io
  id-token: write   # required for provenance attestation (docker/build-push-action@v6)

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use PAT so the botImage commit can trigger deploy-matrix.
          # GITHUB_TOKEN pushes are blocked from triggering other workflows (GitHub security policy).
          token: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: apps/matrix/voice-transcription-bot
          platforms: linux/amd64
          # Only push to GHCR on push to main or manual trigger.
          # PRs build the image but do not push (forks lack package write access).
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/voice-transcription-bot:latest
            ghcr.io/${{ github.repository_owner }}/voice-transcription-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Pulumi.dev.yaml with new image SHA
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/voice-transcription-bot:${{ github.sha }}"
          sed -i "s|matrix:botImage:.*|matrix:botImage: ${IMAGE}|" apps/matrix/Pulumi.dev.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/matrix/Pulumi.dev.yaml
          git diff --cached --quiet || git commit -m "chore(matrix): update botImage to ${{ github.sha }}"
          git push
