name: Deploy lobehub

# Deploys the lobehub Pulumi stack to the homelab k3s cluster.
#
# Uses the reusable workflow from mrsimpson/homelab which handles:
#   - Tailscale VPN join (to reach the local cluster API)
#   - kubeconfig setup
#   - pulumi up / preview
#
# The official upstream image (ghcr.io/lobehub/lobe-chat) is used directly —
# no custom image build is required. Update the image by running:
#   pulumi config set lobehub:lobehubImage ghcr.io/lobehub/lobe-chat:<tag> \
#     --cwd apps/lobehub
# then commit Pulumi.dev.yaml.
#
# Pulumi project: "lobehub" (Pulumi.yaml name: lobehub)
# Stack: mrsimpson/lobehub/dev
# Base infra read via: StackReference("mrsimpson/homelab/dev")
#
# Required repository secrets:
#   TS_OAUTH_CLIENT_ID, TS_OAUTH_CLIENT_SECRET  — Tailscale OAuth client (tag:ci)
#   KUBECONFIG                                   — base64-encoded namespace-scoped kubeconfig
#   PULUMI_ACCESS_TOKEN                          — Pulumi Cloud access token
#
# Bootstrap secrets with: ./scripts/setup-homelab-apps.sh
# (from the mrsimpson/homelab repository)

on:
  # Deploy on any commit that touches the lobehub stack config or code.
  push:
    branches:
      - main
    paths:
      - apps/lobehub/**

  # Manual deploy with optional image override.
  workflow_dispatch:
    inputs:
      lobehubImage:
        description: "lobehub image tag (leave blank to keep current stack config)"
        type: string
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Optional pre-step: update image tag in Pulumi stack config before deploying.
  # Only runs when an image override is provided via workflow_dispatch.
  update-image-config:
    name: Update image config
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && inputs.lobehubImage != ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/lobehub/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/lobehub

      - name: Update image tag in Pulumi config
        run: |
          pulumi config set lobehub:lobehubImage "${{ inputs.lobehubImage }}" \
            --cwd apps/lobehub
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # Main deploy job — calls the reusable workflow from the homelab repo.
  deploy:
    name: Deploy
    needs: [update-image-config]
    if: >
      always() && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && (
          needs.update-image-config.result == 'success' ||
          needs.update-image-config.result == 'skipped'
        ))
      )
    uses: mrsimpson/homelab/.github/workflows/deploy-to-cluster.yml@main
    with:
      # Pulumi project "lobehub" (from apps/lobehub/Pulumi.yaml "name: lobehub").
      # NOT mrsimpson/homelab/dev — that is the base infra stack read via StackReference.
      pulumi-stack: mrsimpson/lobehub/dev
      working-directory: apps/lobehub
      pulumi-command: up
    secrets: inherit
