name: Deploy lobehub

# Deploys the lobehub Pulumi stack to the homelab k3s cluster.
#
# Uses the reusable workflow from digitaleraluhut/homelab which handles:
#   - Tailscale VPN join (to reach the local cluster API)
#   - kubeconfig setup
#   - pulumi up / preview
#
# The official Docker Hub image (lobehub/lobehub) is used directly —
# no custom image build is required. Update the image by running:
#   pulumi config set lobehub:lobehubImage lobehub/lobehub:<version> \
#     --cwd apps/lobehub
# then commit Pulumi.dev.yaml. Available tags: https://hub.docker.com/r/lobehub/lobehub/tags
#
# Pulumi project: "lobehub" (Pulumi.yaml name: lobehub)
# Stack: digitaleraluhut/lobehub/dev
# Base infra read via: StackReference("digitaleraluhut/homelab/dev")
#
# Required repository secrets:
#   TS_OAUTH_CLIENT_ID, TS_OAUTH_CLIENT_SECRET  — Tailscale OAuth client (tag:ci)
#   KUBECONFIG                                   — base64-encoded kubeconfig for the shared
#                                                  homelab-apps CI ServiceAccount (ci/homelab-apps)
#   PULUMI_ACCESS_TOKEN                          — Pulumi Cloud access token
#
# Bootstrap secrets with: ./scripts/setup-homelab-apps.sh
# (from the digitaleraluhut/homelab repository)

on:
  # Deploy on any commit that touches the lobehub stack config or code.
  # Excludes docs, vibe planning files, and markdown — changes there don't
  # affect the running stack and should not trigger a deployment.
  push:
    branches:
      - main
    paths:
      - apps/lobehub/**
      - "!apps/lobehub/docs/**"
      - "!apps/lobehub/.vibe/**"
      - "!**/*.md"

  # Manual deploy with optional image override.
  workflow_dispatch:
    inputs:
      lobehubImage:
        description: "lobehub image tag (leave blank to keep current stack config)"
        type: string
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Optional pre-step: update image tag in Pulumi stack config before deploying.
  # Only runs when an image override is provided via workflow_dispatch.
  update-image-config:
    name: Update image config
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && inputs.lobehubImage != ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          # package-lock.json lives at the repo root (npm workspaces monorepo)
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # npm ci from the workspace subdirectory walks up to find the root package-lock.json
        # and installs all workspace dependencies into the root node_modules/.
        run: npm ci
        working-directory: apps/lobehub

      - name: Update image tag in Pulumi config
        run: |
          pulumi config set lobehub:lobehubImage "${{ inputs.lobehubImage }}" \
            --cwd apps/lobehub
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # Main deploy job — calls the reusable workflow from the homelab repo.
  # Pinned to a specific commit SHA (not @main) to prevent unexpected changes
  # from running with this repo's secrets.
  # To update: get the latest SHA from digitaleraluhut/homelab and update the ref below.
  # Current SHA corresponds to: fix(scripts): replace namespace Role with ClusterRole
  deploy:
    name: Deploy
    needs: [update-image-config]
    if: >
      always() && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && (
          needs.update-image-config.result == 'success' ||
          needs.update-image-config.result == 'skipped'
        ))
      )
    uses: digitaleraluhut/homelab/.github/workflows/deploy-to-cluster.yml@c7dd6ee8bbd17688021671d052ea933cd9a10af2
    with:
      # Pulumi project "lobehub" (from apps/lobehub/Pulumi.yaml "name: lobehub").
      # NOT digitaleraluhut/homelab/dev — that is the base infra stack read via StackReference.
      pulumi-stack: mrsimpson/lobehub/dev
      working-directory: apps/lobehub
      pulumi-command: up
      # package-lock.json is at the repo root (npm workspaces monorepo, not in apps/lobehub/)
      npm-lock-file-path: package-lock.json
    secrets:
      # Explicit secrets map — do NOT use "secrets: inherit" (would pass all secrets
      # to the reusable workflow, including any future secrets added to this repo).
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_CLIENT_SECRET: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
