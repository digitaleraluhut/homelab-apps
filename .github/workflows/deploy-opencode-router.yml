name: Deploy opencode-router

# Deploys the opencode-router Pulumi stack to the homelab k3s cluster.
#
# Single-job workflow: updates image config (optional), commits, and deploys
# all in one runner context. This avoids race conditions where a separate job
# checks out the repo before a config commit has propagated.
#
# Image: ghcr.io/mrsimpson/opencode-router (built by digitaleraluhut/opencode-router CI)
# Available tags: https://github.com/digitaleraluhut/opencode-router/pkgs/container/opencode-router
#
# Pulumi project: "opencode" (Pulumi.yaml name: opencode)
# Stack: digitaleraluhut/opencode/dev
# Base infra read via: StackReference("digitaleraluhut/homelab/dev")
#
# Required repository secrets:
#   TS_OAUTH_CLIENT_ID, TS_OAUTH_CLIENT_SECRET  — Tailscale OAuth client (tag:ci)
#   KUBECONFIG                                   — base64-encoded kubeconfig for the shared
#                                                  homelab-apps CI ServiceAccount (ci/homelab-apps)
#   PULUMI_ACCESS_TOKEN                          — Pulumi Cloud access token

on:
  # Deploy on any commit that touches the opencode-router stack config or code.
  push:
    branches:
      - main
    paths:
      - apps/opencode-router/**
      - "!apps/opencode-router/docs/**"
      - "!apps/opencode-router/.vibe/**"
      - "!**/*.md"

  # Manual deploy with optional image override.
  workflow_dispatch:
    inputs:
      routerImage:
        description: "opencode-router image tag (leave blank to keep current stack config)"
        type: string
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WORKING_DIR: apps/opencode-router
  PULUMI_STACK: digitaleraluhut/opencode/dev

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Update image tag in Pulumi config
        if: github.event_name == 'workflow_dispatch' && inputs.routerImage != ''
        run: |
          pulumi config set code:routerImage "${{ inputs.routerImage }}" \
            --stack ${{ env.PULUMI_STACK }} \
            --cwd ${{ env.WORKING_DIR }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Commit updated Pulumi config
        if: github.event_name == 'workflow_dispatch' && inputs.routerImage != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.WORKING_DIR }}/Pulumi.dev.yaml
          git diff --cached --quiet || git commit -m "chore(opencode-router): update routerImage to ${{ inputs.routerImage }}"
          git pull --rebase origin main
          git push

      # Join the Tailscale tailnet so we can reach the cluster's Kubernetes API.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl version --request-timeout=10s

      - name: Pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.WORKING_DIR }}
          refresh: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
